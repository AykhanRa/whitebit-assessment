name: Test Assessment

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: cd contracts && npm install --legacy-peer-deps
      - run: cd contracts && npx hardhat test

