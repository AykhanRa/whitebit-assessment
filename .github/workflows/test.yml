name: Test Assessment

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./contracts
      - name: Run tests
        run: npx hardhat test
        working-directory: ./contracts
